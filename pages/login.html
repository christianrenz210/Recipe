<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RecipeShare</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
</head>
<body>

    <section class="auth-page">
        <nav aria-label="breadcrumb" class="auth-breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="../index.html"><i class="fas fa-home me-1"></i>Home</a></li>
                <li class="breadcrumb-item active">Login</li>
            </ol>
        </nav>
        <div class="auth-card">
            <div class="auth-card-header">
                <a href="../index.html" class="text-white text-decoration-none">
                    <h3><i class="fas fa-utensils me-2"></i>RecipeShare</h3>
                </a>
                <p>Welcome back! Sign in to your account</p>
            </div>
            <div class="auth-card-body">
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label fw500">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                            <input type="email" id="loginEmail" class="form-control" placeholder="Enter your email">
                        </div>
                        <div class="invalid-feedback">Please enter your email.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw500">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" id="loginPassword" class="form-control" placeholder="Enter your password">
                        </div>
                        <div class="invalid-feedback">Please enter your password.</div>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="rememberMe">
                            <label class="form-check-label" for="rememberMe">Remember me</label>
                        </div>
                        <a href="#" class="text-decoration-none" style="color: var(--primary); font-size: 0.9rem;">Forgot password?</a>
                    </div>
                    <button type="submit" id="loginBtn" class="btn btn-primary-custom">Sign In <i class="fas fa-arrow-right ms-2"></i></button>
                </form>

                <div class="auth-divider"><span>or continue with</span></div>

                <div class="d-flex gap-2">
                    <button class="btn btn-outline-secondary flex-fill" onclick="window.location.href=(location.port==='5500'?'http://localhost:3000':'')+'/auth/google'"><i class="fab fa-google me-2"></i>Google</button>
                </div>

                <div class="auth-footer">
                    <p>Don't have an account? <a href="register.html">Register here</a></p>
                    <a href="../index.html" class="text-decoration-none" style="color: var(--gray); font-size: 0.9rem;"><i class="fas fa-arrow-left me-1"></i>Back to Home</a>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
    <script src="../js/script.js"></script>
</body>
</html>
