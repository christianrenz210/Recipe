<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - RecipeShare</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
</head>
<body>

    <section class="auth-page">
        <nav aria-label="breadcrumb" class="auth-breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="../index.html"><i class="fas fa-home me-1"></i>Home</a></li>
                <li class="breadcrumb-item active">Register</li>
            </ol>
        </nav>
        <div class="auth-card">
            <div class="auth-card-header">
                <a href="../index.html" class="text-white text-decoration-none">
                    <h3><i class="fas fa-utensils me-2"></i>RecipeShare</h3>
                </a>
                <p>Create your free account and start sharing recipes!</p>
            </div>
            <div class="auth-card-body">
                <form id="registerForm">
                    <div class="mb-3">
                        <label class="form-label fw500">Full Name</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" id="regName" class="form-control" placeholder="Enter your full name">
                        </div>
                        <div class="invalid-feedback">Please enter your name.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw500">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                            <input type="email" id="regEmail" class="form-control" placeholder="Enter your email">
                        </div>
                        <div class="invalid-feedback">Please enter a valid email.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw500">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" id="regPassword" class="form-control" placeholder="Create a password">
                        </div>
                        <div class="password-strength"><div class="bar"></div></div>
                        <div class="invalid-feedback">Password must be at least 6 characters.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw500">Confirm Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" id="regConfirmPassword" class="form-control" placeholder="Confirm your password">
                        </div>
                        <div class="invalid-feedback">Passwords do not match.</div>
                    </div>
                    <div class="mb-4">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="termsCheck">
                            <label class="form-check-label" for="termsCheck">
                                I agree to the <a href="#" style="color: var(--primary);">Terms of Service</a> and <a href="#" style="color: var(--primary);">Privacy Policy</a>
                            </label>
                        </div>
                        <small class="text-danger terms-error" style="display: none;">You must agree to the terms.</small>
                    </div>
                    <button type="submit" id="registerBtn" class="btn btn-primary-custom">Create Account <i class="fas fa-user-plus ms-2"></i></button>
                </form>

                <div class="auth-divider"><span>or sign up with</span></div>

                <div class="d-flex gap-2">
                    <button class="btn btn-outline-secondary flex-fill" onclick="window.location.href=(location.port==='5500'?'http://localhost:3000':'')+'/auth/google'"><i class="fab fa-google me-2"></i>Google</button>
                </div>

                <div class="auth-footer">
                    <p>Already have an account? <a href="login.html">Sign in</a></p>
                    <a href="../index.html" class="text-decoration-none" style="color: var(--gray); font-size: 0.9rem;"><i class="fas fa-arrow-left me-1"></i>Back to Home</a>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
    <script src="../js/script.js"></script>
</body>
</html>
